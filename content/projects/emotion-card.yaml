slug: emotion-card
title: Emotion Card
summary: 매일의 감정을 기록하고 8x8 도트 아트로 시각화하는 감정 일기 서비스

description: |
  ## 문제
  감정을 기록하는 것은 정신 건강에 중요하지만, 긴 일기를 쓰는 것은 부담스러울 수 있습니다.

  ## 접근 방식
  8가지 감정 중 하나를 선택하고 30자 이내로 이유를 적는 간단한 기록 방식을 설계했습니다.
  감정은 고유한 8x8 도트 아트 패턴으로 자동 생성되어 타임라인에서 시각적으로 확인할 수 있습니다.

  ## 결과
  - 간단하고 직관적인 감정 기록 경험 제공
  - Cloudflare Pages/Workers로 서버리스 배포
  - D1 Database로 경량 데이터 관리

techStack:
  - Next.js 14
  - NestJS 10
  - TypeScript
  - TailwindCSS
  - Cloudflare Workers
  - Cloudflare Pages
  - Cloudflare D1

