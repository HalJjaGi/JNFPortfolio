# 샘플 프로젝트 데이터

slug: sample-project
title: 포트폴리오 웹사이트
summary: 팀원들의 성장과 성과를 기록하는 포트폴리오 플랫폼

description: |
  ## 문제
  팀원 각자의 역량과 성과를 체계적으로 정리할 필요가 있었습니다.
  기존의 방식으로는 개별 포트폴리오가 흩어져 있어 전체 팀의 역량을 파악하기 어려웠습니다.
  
  ## 접근 방식
  YAML 기반의 데이터 관리 시스템을 구축했습니다.
  비개발자도 쉽게 콘텐츠를 추가할 수 있도록 템플릿을 제공합니다.
  Next.js의 정적 생성을 활용해 빠르고 안정적인 배포를 목표로 했습니다.
  
  ## 결과
  Cloudflare Pages를 통해 빠르고 안정적인 서비스를 제공합니다.
  팀원 누구나 쉽게 데이터를 추가할 수 있는 구조를 만들었습니다.

techStack:
  - Next.js 16
  - TypeScript
  - Tailwind CSS
  - YAML

